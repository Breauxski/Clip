name: Compile Clip iOS App
on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: 'recursive' 

      - name: Set up Xcode Version
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build Unsigned IPA
        run: |
          mkdir -p build
          xcodebuild archive \
            -workspace Clip.xcworkspace \
            -scheme Clip \
            -configuration Release \
            -archivePath build/Clip.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

          mkdir -p Payload
          cp -r build/Clip.xcarchive/Products/Applications/Clip.app Payload/
          zip -r Clip_Unsigned.ipa Payload

      - name: Upload Compiled File
        uses: actions/upload-artifact@v4
        with:
          name: Clip-Unsigned-IPA
          path: Clip_Unsigned.ipa
