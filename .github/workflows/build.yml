name: Compile Clip iOS App
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Build Core Target Only
        run: |
          mkdir -p build
          
          # Compiles ONLY the primary executable block, ignoring extensions
          xcodebuild archive \
            -workspace Clip.xcworkspace \
            -scheme Clip \
            -configuration Release \
            -archivePath build/Clip.xcarchive \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER=""

      - name: Package Into Clean Sideloadable IPA
        run: |
          mkdir -p Payload
          cp -r build/Clip.xcarchive/Products/Applications/Clip.app Payload/
          zip -r Clip_Clean.ipa Payload

      - name: Upload Compiled File
        uses: actions/upload-artifact@v4
        with:
          name: Clip-Clean-IPA
          path: Clip_Clean.ipa
