name: Compile Clip iOS App
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Find and Build Project
        run: |
          mkdir -p build
          
          # Force lower-case check or alternative project formats if workspace is missing
          if [ -d "Clip.xcworkspace" ]; then
            TARGET_FLAGS="-workspace Clip.xcworkspace -scheme Clip"
          elif [ -d "clip.xcworkspace" ]; then
            TARGET_FLAGS="-workspace clip.xcworkspace -scheme Clip"
          elif [ -d "Clip.xcodeproj" ]; then
            TARGET_FLAGS="-project Clip.xcodeproj -scheme Clip"
          else
            TARGET_FLAGS="-project clip.xcodeproj -scheme Clip"
          fi
          
          echo "Building using flags: $TARGET_FLAGS"
          
          xcodebuild archive \
            $TARGET_FLAGS \
            -configuration Release \
            -archivePath build/Clip.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

      - name: Package Into Sideloadable IPA
        run: |
          mkdir -p Payload
          cp -r build/Clip.xcarchive/Products/Applications/Clip.app Payload/
          zip -r Clip_Unsigned.ipa Payload

      - name: Upload Compiled File
        uses: actions/upload-artifact@v4
        with:
          name: Clip-Unsigned-IPA
          path: Clip_Unsigned.ipa
